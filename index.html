<!DOCTYPE html>
<html>
<head>
    <title>Mail ID Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Mail ID Details</h2>

<form id="mailForm">
    <input type="email" name="email" placeholder="Email ID" required>
    <input type="text" name="dropbox" placeholder="Dropbox">
    <input type="text" name="google_drive" placeholder="Google Drive">
    <input type="text" name="one_drive" placeholder="One Drive">
    <input type="text" name="mega" placeholder="Mega">
    <button type="submit">Save</button>
</form>

<table>
    <thead>
        <tr>
            <th>Sl</th>
            <th>Email</th>
            <th>Dropbox</th>
            <th>Google Drive</th>
            <th>One Drive</th>
            <th>Mega</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="dataBody"></tbody>
</table>

<script src="script.js"></script>
</body>
</html>
